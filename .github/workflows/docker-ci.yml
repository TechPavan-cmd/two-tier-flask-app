name: Flask Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Code checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.7828007626 }} 
          password: ${{ secrets.Indore2025 }} 

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t 7828007626/flaskapp:latest .

      # 4️⃣ Push Docker image
      - name: Push Docker image to Docker Hub
        run: |
          docker build -t 7828007626/flaskapp:latest .

      # 5️⃣ Deploy to server (optional)
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.217.145.69.24 }} 
          username: ${{ secrets.root }} 
          key: ${{ secrets.572550 }} 
          script: |
            cd /root/downloads/two-tier-flask-app
            docker-compose pull
            docker-compose up -d 



